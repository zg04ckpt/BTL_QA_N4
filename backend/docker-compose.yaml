services:
  api:
    container_name: 'qa_api'
    image: qa_api:latest
    ports:
      - "5006:8080"
    depends_on:
      - ml_server
    networks:
      - default_net

  ml_server:
    container_name: 'qa_ml_server'
    build:
      context: ./MLServer
      dockerfile: Dockerfile
    ports:
      - "2002:2002"
    networks:
      - default_net

networks:
  default_net:
    external: true